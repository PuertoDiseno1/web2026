services:
  postgres:
    image: postgres:16-alpine
    container_name: puerto-diseno-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: puerto
      POSTGRES_PASSWORD: puerto123
      POSTGRES_DB: puerto_diseno
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
